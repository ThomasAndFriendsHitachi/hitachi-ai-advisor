services:
  # --- DATABASE (PostgreSQL) ---
  postgres_db:
    image: postgres:15-alpine
    container_name: advisor_db
    restart: always
    environment:
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: super_password
      POSTGRES_DB: release_pipeline_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - advisor_net

  # --- MESSAGE BROKER (Redis) ---
  redis_broker:
    image: redis:7-alpine
    container_name: advisor_redis
    ports:
      - "6379:6379"
    networks:
      - advisor_net

  # --- WEBHOOK MANAGER ---
  webhook-manager:
    build: ./webhook-manager
    container_name: webhook_manager
    restart: on-failure
    ports:
      - "3000:3000" #Webhooks incoming from gh
    depends_on:
      - redis_broker
    environment:
      - REDIS_URL=redis://redis_broker:6379
      - PORT=3000
    networks:
      - advisor_net

volumes:
  postgres_data:

networks:
  advisor_net:
    driver: bridge